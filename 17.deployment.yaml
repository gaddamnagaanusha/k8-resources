apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  #these labels are deployment labels
  labels:
    project: roboshop
    purpose: replicaset-demo
    tier: frontend
    component: frontend
spec:
  replicas: 3
  selector:
  #using these labels, replicaset will identify the pods which are part of this replicaset
    matchLabels:
      project: roboshop
      purpose: replicaset-demo
      tier: frontend
      component: frontend

    #this is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        purpose: replicaset-demo
        tier: frontend
        component: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine3.23-perl  
